name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@v17

      - uses: DeterminateSystems/flakehub-cache-action@v3.17.3

      - run: nix build .#darwinConfigurations.m1.system
